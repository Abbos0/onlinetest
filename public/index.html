<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - Online Test</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Online Test Tizimi</h1>
            <a href="/admin-login.html" class="admin-btn">Admin</a>
        </div>

        <div class="register-box">
            <h2>Ro'yxatdan o'tish</h2>
            <form id="registerForm">
                <div class="form-group">
                    <input type="text" id="ism" name="ism" placeholder="Ismingizni kiriting" required>
                    <span class="error-msg" id="ismError"></span>
                </div>
                <div class="form-group">
                    <input type="text" id="familiya" name="familiya" placeholder="Familiyangizni kiriting" required>
                    <span class="error-msg" id="familiyaError"></span>
                </div>
                <div class="form-group">
                    <div class="phone-input-wrapper">
                        <span class="phone-prefix">+998</span>
                        <input type="tel" id="telefon" name="telefon" placeholder="90 123 45 67" maxlength="12" required>
                    </div>
                    <span class="error-msg" id="telefonError"></span>
                </div>
                <button type="submit" class="btn-primary">Testni boshlash</button>
            </form>
        </div>
    </div>

    <script src="/js/register.js"></script>
</body>
</html>
